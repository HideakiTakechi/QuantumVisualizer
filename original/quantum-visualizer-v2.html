<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Gate Visualizer</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for standalone execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        body { font-family: sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        /* スクロールバーの非表示調整など */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Lucide icon components wrapper for standalone use
        const Play = ({ size = 18 }) => <i data-lucide="play" style={{width: size, height: size}}></i>;
        const Copy = ({ size = 18 }) => <i data-lucide="copy" style={{width: size, height: size}}></i>;
        const Check = ({ size = 18, className }) => <i data-lucide="check" style={{width: size, height: size}} className={className}></i>;
        const Trash2 = ({ size = 18 }) => <i data-lucide="trash-2" style={{width: size, height: size}}></i>;
        const Plus = ({ size = 18 }) => <i data-lucide="plus" style={{width: size, height: size}}></i>;
        const Minus = ({ size = 18 }) => <i data-lucide="minus" style={{width: size, height: size}}></i>;

        // --- 複素数クラス ---
        class Complex {
            constructor(re, im = 0) { this.re = re; this.im = im; }
            add(c) { return new Complex(this.re + c.re, this.im + c.im); }
            sub(c) { return new Complex(this.re - c.re, this.im - c.im); }
            mul(c) { return new Complex(this.re * c.re - this.im * c.im, this.re * c.im + this.im * c.re); }
            mulReal(r) { return new Complex(this.re * r, this.im * r); }
            conj() { return new Complex(this.re, -this.im); }
            mag() { return Math.sqrt(this.re * this.re + this.im * this.im); }
        }

        const C = (re, im = 0) => new Complex(re, im);
        const ZERO = C(0);
        const ONE = C(1);
        const I = C(0, 1);
        const SQRT2_INV = C(1 / Math.SQRT2);

        const GATES = {
            'I': [[ONE, ZERO], [ZERO, ONE]],
            'X': [[ZERO, ONE], [ONE, ZERO]],
            'Y': [[ZERO, C(0, -1)], [I, ZERO]],
            'Z': [[ONE, ZERO], [ZERO, C(-1)]],
            'H': [[SQRT2_INV, SQRT2_INV], [SQRT2_INV, C(-1 / Math.SQRT2)]],
            'S': [[ONE, ZERO], [ZERO, I]],
            'T': [[ONE, ZERO], [ZERO, C(Math.cos(Math.PI / 4), Math.sin(Math.PI / 4))]],
        };

        function parseInitialState(str) {
            const s = str.trim().toLowerCase().replace(/[\s\|>⟩〉]/g, '');
            if (s === '0' || s === '') return { vec: [ONE, ZERO], name: '0' };
            if (s === '1') return { vec: [ZERO, ONE], name: '1' };
            if (s === '+') return { vec: [SQRT2_INV, SQRT2_INV], name: '+' };
            if (s === '-') return { vec: [SQRT2_INV, C(-1 / Math.SQRT2)], name: '-' };
            if (s === 'i') return { vec: [SQRT2_INV, C(0, 1 / Math.SQRT2)], name: 'i' };
            if (s === '-i') return { vec: [SQRT2_INV, C(0, -1 / Math.SQRT2)], name: '-i' };
            return null;
        }

        function parseGate(str) {
            const s = str.trim().toUpperCase();
            if (s === 'I' || s === 'ID') return 'I';
            if (s === 'X' || s === 'NOT') return 'X';
            if (s === 'Y') return 'Y';
            if (s === 'Z') return 'Z';
            if (s === 'H' || s === 'HADAMARD') return 'H';
            if (s === 'S') return 'S';
            if (s === 'T') return 'T';
            return null;
        }

        function multiplyMatrixVector(M, v) {
            return [
                M[0][0].mul(v[0]).add(M[0][1].mul(v[1])),
                M[1][0].mul(v[0]).add(M[1][1].mul(v[1]))
            ];
        }

        function stateToBloch(alpha, beta) {
            const x = 2 * (alpha.re * beta.re + alpha.im * beta.im);
            const y = 2 * (alpha.re * beta.im - alpha.im * beta.re);
            const z = alpha.mag() ** 2 - beta.mag() ** 2;
            return { x, y, z };
        }

        function makeSU2(M) {
            const det = M[0][0].mul(M[1][1]).sub(M[0][1].mul(M[1][0]));
            const phi = Math.atan2(det.im, det.re);
            const phase = C(Math.cos(-phi / 2), Math.sin(-phi / 2));
            return [
                [M[0][0].mul(phase), M[0][1].mul(phase)],
                [M[1][0].mul(phase), M[1][1].mul(phase)]
            ];
        }

        function getInterpolatedMatrix(SU2, t) {
            const alpha = SU2[0][0];
            const beta = SU2[1][0];
            let cosHalfTheta = Math.max(-1, Math.min(1, alpha.re));
            const halfTheta = Math.acos(cosHalfTheta);
            const theta = 2 * halfTheta;
            let nz = 1, nx = 0, ny = 0;
            const sinHalfTheta = Math.sin(halfTheta);
            if (Math.abs(sinHalfTheta) > 1e-6) {
                nz = -alpha.im / sinHalfTheta;
                nx = -beta.im / sinHalfTheta;
                ny = beta.re / sinHalfTheta;
            }
            const ht = t * theta / 2;
            const cosHT = Math.cos(ht);
            const sinHT = Math.sin(ht);
            return [
                [C(cosHT, -sinHT * nz), C(-sinHT * ny, -sinHT * nx)],
                [C(sinHT * ny, -sinHT * nx), C(cosHT, sinHT * nz)]
            ];
        }

        // --- 状態ベクトルを文字列表示に変換する関数 ---
        function formatComplex(c) {
            const EPSILON = 1e-4;
            if (Math.abs(c.re) < EPSILON && Math.abs(c.im) < EPSILON) return "0";
            
            let reStr = Math.abs(c.re) >= EPSILON ? c.re.toFixed(2).replace(/\.?0+$/, '') : "";
            let imStr = Math.abs(c.im) >= EPSILON ? Math.abs(c.im).toFixed(2).replace(/\.?0+$/, '') + "i" : "";
            
            if (reStr && imStr) {
                const sign = c.im > 0 ? " + " : " - ";
                return `${reStr}${sign}${imStr.replace('-','')}`;
            }
            if (reStr) return reStr;
            if (imStr) return c.im < 0 ? "-" + Math.abs(c.im).toFixed(2).replace(/\.?0+$/, '') + "i" : imStr;
            return "0";
        }

        function vecToStateString(vec) {
            const states = [
                { name: '|0⟩', vec: [ONE, ZERO] },
                { name: '|1⟩', vec: [ZERO, ONE] },
                { name: '|+⟩', vec: [SQRT2_INV, SQRT2_INV] },
                { name: '|-⟩', vec: [SQRT2_INV, C(-1 / Math.SQRT2)] },
                { name: '|i⟩', vec: [SQRT2_INV, C(0, 1 / Math.SQRT2)] },
                { name: '|-i⟩', vec: [SQRT2_INV, C(0, -1 / Math.SQRT2)] }
            ];

            for (let s of states) {
                const dot = vec[0].conj().mul(s.vec[0]).add(vec[1].conj().mul(s.vec[1]));
                const prob = dot.mag() ** 2;
                if (prob > 0.9999) return s.name;
            }

            const c0 = formatComplex(vec[0]);
            const c1 = formatComplex(vec[1]);
            
            let res = "";
            if (c0 !== "0") res += `(${c0})|0⟩`;
            if (c1 !== "0") {
                if (res !== "") res += " + ";
                res += `(${c1})|1⟩`;
            }
            return res;
        }

        const BlochSphereSVG = ({ vector, trail, label, isActive }) => {
            const R = 100;
            const to2D = (x, y, z) => {
                const angle = Math.PI / 6; 
                const cosA = Math.cos(angle);
                const sinA = Math.sin(angle);
                const cx = (-x * cosA + y * cosA) * R;
                const cy = (x * sinA + y * sinA - z) * R;
                return { cx, cy };
            };

            const generateCirclePath = (plane) => {
                const pts = [];
                for (let i = 0; i <= 60; i++) {
                    const a = (i / 60) * 2 * Math.PI;
                    let p;
                    if (plane === 'xy') p = to2D(Math.cos(a), Math.sin(a), 0);
                    else if (plane === 'xz') p = to2D(Math.cos(a), 0, Math.sin(a));
                    else if (plane === 'yz') p = to2D(0, Math.cos(a), Math.sin(a));
                    pts.push(`${p.cx},${p.cy}`);
                }
                return `M ${pts.join(' L ')}`;
            };

            const origin = to2D(0, 0, 0);
            const xAxPos = to2D(1.3, 0, 0);
            const xAxNeg = to2D(-1.3, 0, 0);
            const yAxPos = to2D(0, 1.3, 0);
            const yAxNeg = to2D(0, -1.3, 0);
            const zAxPos = to2D(0, 0, 1.3);
            const zAxNeg = to2D(0, 0, -1.3);

            const vec = to2D(vector.x, vector.y, vector.z);
            const trailPath = trail && trail.length > 0 
                ? trail.map(p => { const p2 = to2D(p.x, p.y, p.z); return `${p2.cx},${p2.cy}`; }).join(' L ')
                : '';

            return (
                <div className={`flex flex-col items-center p-4 rounded-xl transition-all duration-500 ${isActive ? 'bg-blue-50 shadow-sm border border-blue-100' : 'bg-white'}`}>
                    <svg width={280} height={280} viewBox="-140 -140 280 280" className="overflow-visible">
                        <defs>
                            <radialGradient id="sphereGrad" cx="30%" cy="30%" r="70%">
                                <stop offset="0%" stopColor="#ffffff" stopOpacity="0.8" />
                                <stop offset="100%" stopColor="#e2e8f0" stopOpacity="0.3" />
                            </radialGradient>
                            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48" />
                            </marker>
                        </defs>
                        <circle cx={0} cy={0} r={R} fill="url(#sphereGrad)" stroke="#cbd5e1" strokeWidth={1} />
                        <path d={generateCirclePath('xy')} fill="none" stroke="#94a3b8" strokeWidth={1} strokeDasharray="4 4" />
                        <path d={generateCirclePath('xz')} fill="none" stroke="#e2e8f0" strokeWidth={1} />
                        <path d={generateCirclePath('yz')} fill="none" stroke="#e2e8f0" strokeWidth={1} />
                        
                        {/* 座標軸 */}
                        <line x1={xAxNeg.cx} y1={xAxNeg.cy} x2={xAxPos.cx} y2={xAxPos.cy} stroke="#cbd5e1" strokeWidth={1.5} />
                        <line x1={yAxNeg.cx} y1={yAxNeg.cy} x2={yAxPos.cx} y2={yAxPos.cy} stroke="#cbd5e1" strokeWidth={1.5} />
                        <line x1={zAxNeg.cx} y1={zAxNeg.cy} x2={zAxPos.cx} y2={zAxPos.cy} stroke="#cbd5e1" strokeWidth={1.5} />
                        
                        {/* 軸ラベル (X, Y, Z) */}
                        <text x={xAxPos.cx - 5} y={xAxPos.cy + 15} fontSize={10} fill="#94a3b8" className="font-bold">X</text>
                        <text x={yAxPos.cx + 5} y={yAxPos.cy + 15} fontSize={10} fill="#94a3b8" className="font-bold">Y</text>
                        <text x={zAxPos.cx + 12} y={zAxPos.cy + 5} fontSize={10} fill="#94a3b8" className="font-bold">Z</text>

                        {/* 状態ラベル */}
                        {/* Z軸: |0>, |1> */}
                        <text x={zAxPos.cx} y={zAxPos.cy - 10} fontSize={12} fill="#475569" textAnchor="middle" fontWeight="bold">|0⟩</text>
                        <text x={zAxNeg.cx} y={zAxNeg.cy + 15} fontSize={12} fill="#475569" textAnchor="middle" fontWeight="bold">|1⟩</text>
                        
                        {/* X軸: |+>, |-> */}
                        <text x={xAxPos.cx - 15} y={xAxPos.cy + 10} fontSize={11} fill="#64748b" textAnchor="middle" fontWeight="semibold">|+⟩</text>
                        <text x={xAxNeg.cx + 15} y={xAxNeg.cy - 5} fontSize={11} fill="#64748b" textAnchor="middle" fontWeight="semibold">|-⟩</text>
                        
                        {/* Y軸: |i>, |-i> */}
                        <text x={yAxPos.cx + 15} y={yAxPos.cy + 10} fontSize={11} fill="#64748b" textAnchor="middle" fontWeight="semibold">|i⟩</text>
                        <text x={yAxNeg.cx - 15} y={yAxNeg.cy - 5} fontSize={11} fill="#64748b" textAnchor="middle" fontWeight="semibold">|-i⟩</text>

                        {/* 軌跡とベクトル */}
                        {trailPath && <path d={`M ${trailPath}`} fill="none" stroke="#f59e0b" strokeWidth={3} strokeDasharray="4 4" opacity={0.8} />}
                        <line x1={origin.cx} y1={origin.cy} x2={vec.cx} y2={vec.cy} stroke="#e11d48" strokeWidth={3} markerEnd="url(#arrow)" />
                        <circle cx={vec.cx} cy={vec.cy} r={3} fill="#e11d48" />
                    </svg>
                    <div className="mt-2 text-lg font-semibold text-gray-700">{label}</div>
                </div>
            );
        };

        // --- 個別のゲート可視化行コンポーネント ---
        const GateVisualizerRow = ({ step, index }) => {
            const [animating, setAnimating] = useState(false);
            const [progress, setProgress] = useState(1);
            const [showTrail, setShowTrail] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const { inVec, outVec, gateName, gateMatrix, inStateStr } = step;
            
            const initialBloch = stateToBloch(inVec[0], inVec[1]);
            const currentBloch = stateToBloch(outVec[0], outVec[1]);
            
            const su2Matrix = makeSU2(gateMatrix);
            const currentMatrix = getInterpolatedMatrix(su2Matrix, progress);
            const currentStateVec = multiplyMatrixVector(currentMatrix, inVec);
            const animBloch = stateToBloch(currentStateVec[0], currentStateVec[1]);

            const currentTrail = [];
            if (animating || (showTrail && progress === 1)) {
                const steps = 60;
                const currentSteps = Math.floor(progress * steps);
                for (let i = 0; i <= currentSteps; i++) {
                    const t = i / steps;
                    const m = getInterpolatedMatrix(su2Matrix, t);
                    const s = multiplyMatrixVector(m, inVec);
                    currentTrail.push(stateToBloch(s[0], s[1]));
                }
            }

            useEffect(() => {
                let animationFrame;
                let startTime;
                const duration = 1200; 
                if (animating) {
                    setShowTrail(true);
                    const stepAnim = (timestamp) => {
                        if (!startTime) startTime = timestamp;
                        const t = Math.min((timestamp - startTime) / duration, 1.0);
                        const easeOut = 1 - Math.pow(1 - t, 3);
                        setProgress(easeOut);
                        if (t < 1.0) animationFrame = requestAnimationFrame(stepAnim);
                        else setAnimating(false);
                    };
                    animationFrame = requestAnimationFrame(stepAnim);
                }
                return () => cancelAnimationFrame(animationFrame);
            }, [animating]);

            useEffect(() => {
                // 初期状態やゲートが変わったらアニメーション状態をリセット
                setProgress(1);
                setAnimating(false);
                setShowTrail(false);
            }, [inStateStr, gateName]);

            const handlePlay = () => { if (!animating) { setProgress(0); setAnimating(true); } };
            const handleClearTrail = () => { setProgress(1); setAnimating(false); setShowTrail(false); };

            return (
                <div className="flex flex-col lg:flex-row items-center justify-center gap-6 py-12 border-b-2 border-slate-100 border-dashed last:border-b-0 relative">
                    <div className="absolute top-0 left-4 bg-slate-200 text-slate-600 px-4 py-1 text-sm font-bold rounded-b-lg">
                        Step {index + 1}
                    </div>
                    
                    <BlochSphereSVG vector={initialBloch} label={`1. 初期状態`} isActive={progress === 0 && animating} />
                    
                    <div className="flex flex-col items-center gap-6">
                        <div className="relative w-28 h-28 bg-white rounded-2xl border-2 border-slate-100 flex items-center justify-center shadow-sm">
                            <span className="text-5xl font-black text-slate-800 tracking-tighter">{gateName}</span>
                        </div>
                        <div className="flex flex-col gap-3">
                            <button onClick={handlePlay} disabled={animating} className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold shadow-md disabled:opacity-50 transition-all transform hover:scale-105 min-w-[160px]">
                                <Play /> <span>回転を見る</span>
                            </button>
                            <button onClick={handleClearTrail} className="flex items-center justify-center gap-2 bg-white border-2 border-slate-200 text-slate-600 px-6 py-2 rounded-full font-bold hover:bg-slate-50 transition-colors text-sm">
                                <Trash2 size={16} /> <span>軌跡をクリア</span>
                            </button>
                        </div>
                    </div>
                    
                    <BlochSphereSVG vector={animBloch} trail={currentTrail} label={`2. 適用後状態`} isActive={progress > 0} />
                </div>
            );
        };


        function App() {
            const [initialStateInput, setInitialStateInput] = useState('|0>');
            const [gates, setGates] = useState(['H']); // 各ステップのゲート文字列を配列で管理
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // ゲートの配列に基づいて、全てのステップの入力/出力状態を計算
            const steps = useMemo(() => {
                const parsedInit = parseInitialState(initialStateInput);
                let currentVec = parsedInit ? parsedInit.vec : [ONE, ZERO];
                
                const calculatedSteps = [];
                for (let i = 0; i < gates.length; i++) {
                    const gStr = gates[i];
                    const gName = parseGate(gStr) || 'I';
                    const gMatrix = GATES[gName];
                    
                    const inVec = currentVec;
                    const outVec = multiplyMatrixVector(gMatrix, inVec);
                    
                    const inStateStr = i === 0 
                        ? (parsedInit ? parsedInit.name : vecToStateString(inVec))
                        : vecToStateString(inVec);
                    const outStateStr = vecToStateString(outVec);

                    calculatedSteps.push({
                        inVec,
                        outVec,
                        gateStr: gStr,
                        gateName: gName,
                        gateMatrix: gMatrix,
                        inStateStr,
                        outStateStr
                    });
                    
                    // 次のステップへ適用後状態を引き継ぐ
                    currentVec = outVec;
                }
                return calculatedSteps;
            }, [initialStateInput, gates]);

            const updateGate = (index, newValue) => {
                const newGates = [...gates];
                newGates[index] = newValue;
                setGates(newGates);
            };

            const addStep = () => setGates([...gates, 'I']);
            const removeStep = () => setGates(gates.slice(0, -1));

            const generateQiskitCode = () => {
                const parsedInit = parseInitialState(initialStateInput);
                const stateName = parsedInit ? parsedInit.name : 'invalid';
                
                let initCode = "";
                if (stateName === '0') initCode = "# デフォルトで |0> 状態です";
                else if (stateName === '1') initCode = "qc.x(0)";
                else if (stateName === '+') initCode = "qc.h(0)";
                else if (stateName === '-') initCode = "qc.x(0)\n    qc.h(0)";
                else if (stateName === 'i') initCode = "qc.h(0)\n    qc.s(0)";
                else if (stateName === '-i') initCode = "qc.x(0)\n    qc.h(0)\n    qc.s(0)";
                else initCode = `# (※未対応の入力のため、一時的に |0> とみなします)`;

                const gateLabels = {
                    'I': 'I (恒等)', 'X': 'X (NOT)', 'Y': 'Y', 'Z': 'Z',
                    'H': 'H (アダマール)', 'S': 'S (位相)', 'T': 'T (π/8回転)'
                };

                // 各行のゲートコードを生成 (コード + タブ + コメント のコンパクト形式)
                let gateCodes = steps.map((step, idx) => {
                    const label = gateLabels[step.gateName] || step.gateName;
                    if (step.gateName === 'I') {
                        return `# I (恒等ゲートのため操作なし)`;
                    }
                    // インデントを考慮し、末尾にタブ/スペースでコメントを付与
                    return `qc.${step.gateName.toLowerCase()}(0)    # ${label}`;
                }).join('\n    ');

                return `from qiskit import QuantumCircuit
from qiskit.quantum_info import Statevector
from qiskit.visualization import plot_bloch_multivector
import matplotlib.pyplot as plt

def solve() -> QuantumCircuit:
    # 0. 量子ビットの準備（初期化後に|0>状態）
    qc = QuantumCircuit(1)
    
    # 1. 初期状態の準備
    ${initCode}
    
    # 2. ゲートの適用
    ${gateCodes}

    return qc

qc = solve()
print(qc)
state = Statevector.from_instruction(qc)
plot_bloch_multivector(state)
plt.show()`;
            };

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = generateQiskitCode();
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const highlightCode = (code) => {
                return code.split('\n').map((line, i) => {
                    let highlighted = line
                        .replace(/^(from|import|def|return)\b/g, '<span class="text-pink-400">$1</span>')
                        .replace(/\b(QuantumCircuit|Statevector)\b/g, '<span class="text-yellow-300">$1</span>')
                        .replace(/#.*/g, '<span class="text-gray-400">$&</span>');
                    return <div key={i} dangerouslySetInnerHTML={{ __html: highlighted || '&nbsp;' }} />;
                });
            };

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-5xl mx-auto space-y-8">
                        <header className="text-center space-y-2">
                            <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">量子ゲート操作可視化ツール <span className="text-blue-600 text-xl align-middle">(1Qubit)</span></h1>
                        </header>

                        {/* --- コントロールパネル (行追加/削除対応) --- */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-4">
                            {steps.map((step, idx) => (
                                <div key={idx} className="flex flex-col md:flex-row items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 w-full relative">
                                    
                                    <div className="hidden md:flex font-bold text-slate-400 w-16 text-center justify-center">
                                        Step {idx + 1}
                                    </div>
                                    
                                    <div className="flex flex-col gap-1 w-full md:w-32 shrink-0">
                                        {idx === 0 ? (
                                            <>
                                                <label className="text-xs font-bold text-slate-500 uppercase">初期状態</label>
                                                <select 
                                                    value={initialStateInput}
                                                    onChange={(e) => setInitialStateInput(e.target.value)}
                                                    className="border-2 border-slate-200 rounded-lg px-2 py-2 bg-white font-mono text-sm focus:border-blue-500 outline-none w-full"
                                                >
                                                    <option value="|0>">|0⟩</option>
                                                    <option value="|1>">|1⟩</option>
                                                    <option value="|+>">|+⟩</option>
                                                    <option value="|->">|-⟩</option>
                                                    <option value="|i>">|i⟩</option>
                                                    <option value="|-i>">|-i⟩</option>
                                                </select>
                                            </>
                                        ) : (
                                            <>
                                                <label className="text-xs font-bold text-slate-500 uppercase">引き継ぎ状態</label>
                                                <div className="px-3 py-2 font-mono text-sm text-slate-600 bg-slate-200/70 rounded-lg border-2 border-transparent w-full overflow-x-auto hide-scrollbar whitespace-nowrap" title={step.inStateStr}>
                                                    {step.inStateStr}
                                                </div>
                                            </>
                                        )}
                                    </div>

                                    <div className="text-slate-300 hidden md:block">→</div>

                                    <div className="flex flex-col gap-1 w-full md:w-36 shrink-0">
                                        <label className="text-xs font-bold text-slate-500 uppercase">適用するゲート</label>
                                        <select 
                                            value={step.gateStr}
                                            onChange={(e) => updateGate(idx, e.target.value)}
                                            className="border-2 border-blue-200 rounded-lg px-2 py-2 bg-white font-mono text-sm focus:border-blue-500 outline-none w-full"
                                        >
                                            <option value="I">I (恒等)</option>
                                            <option value="X">X (NOT)</option>
                                            <option value="Y">Y</option>
                                            <option value="Z">Z</option>
                                            <option value="H">H (アダマール)</option>
                                            <option value="S">S (位相)</option>
                                            <option value="T">T (π/8回転)</option>
                                        </select>
                                    </div>

                                    <div className="text-slate-300 hidden md:block">→</div>

                                    <div className="flex flex-col gap-1 w-full md:flex-1 min-w-0">
                                        <label className="text-xs font-bold text-slate-500 uppercase">適用後状態</label>
                                        <div className="px-3 py-2 font-mono text-sm font-bold text-blue-700 bg-blue-50 border-2 border-blue-100 rounded-lg w-full overflow-x-auto hide-scrollbar whitespace-nowrap shadow-inner" title={step.outStateStr}>
                                            {step.outStateStr}
                                        </div>
                                    </div>

                                    {/* +/- ボタン (最終行のみ) */}
                                    {idx === steps.length - 1 && (
                                        <div className="flex gap-2 mt-4 md:mt-0 justify-center shrink-0">
                                            {steps.length > 1 && (
                                                <button onClick={removeStep} className="flex items-center justify-center w-10 h-10 text-red-500 hover:bg-red-100 hover:text-red-700 rounded-full transition-colors border-2 border-red-200" title="行を削除">
                                                    <Minus size={20} />
                                                </button>
                                            )}
                                            <button onClick={addStep} className="flex items-center justify-center w-10 h-10 text-blue-600 hover:bg-blue-100 hover:text-blue-800 rounded-full transition-colors border-2 border-blue-300" title="行を追加">
                                                <Plus size={20} />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* --- ブロッホ球のアニメーション表示行 --- */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            {steps.map((step, idx) => (
                                <GateVisualizerRow key={idx} step={step} index={idx} />
                            ))}
                        </div>

                        {/* --- Qiskit コード出力 --- */}
                        <div className="bg-[#1e1e1e] rounded-2xl overflow-hidden shadow-xl border border-slate-800">
                            <div className="bg-[#2d2d2d] px-6 py-3 border-b border-slate-700 flex justify-between items-center">
                                <span className="text-slate-300 font-mono text-sm ml-2">qiskit_simulator.py</span>
                                <button onClick={copyToClipboard} className="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm transition-colors bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-md">
                                    {copied ? <Check className="text-green-400" /> : <Copy />}
                                    {copied ? 'Copied!' : 'Copy Code'}
                                </button>
                            </div>
                            <pre className="p-6 overflow-x-auto text-[13px] md:text-sm font-mono text-[#d4d4d4] leading-relaxed">
                                {highlightCode(generateQiskitCode())}
                            </pre>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
